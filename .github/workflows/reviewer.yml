name: reviewer (weekly)

on:
  schedule:
    # 13:00 UTC every Sunday ≈ 21:00 Manila Sunday.
    - cron: '0 13 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  reviewer:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AGENT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: configure git
        run: |
          git config user.name "reviewer-bot"
          git config user.email "reviewer-bot@users.noreply.github.com"

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install claude code
        run: npm install -g @anthropic-ai/claude-code

      - name: authenticate gh
        env:
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}
        run: gh auth status

      - name: run reviewer
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.AGENT_GITHUB_TOKEN }}
        run: |
          claude \
            -p "$(cat agent/reviewer-prompt.md)" \
            --permission-mode bypassPermissions \
            --max-turns 10
